<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tutti — Studio</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--surface-page); }
  #app { height: 100vh; display: flex; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; }
  .main-inner { max-width: 1040px; margin: 0 auto; padding: 32px 40px 64px; }
  .topstrip { height: 56px; display: flex; align-items: center; justify-content: flex-end; gap: 14px; padding: 0 40px; border-bottom: 1px solid var(--border-subtle); background: var(--surface-card); }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="StudioScreen.jsx"></script>
<script type="text/babel" src="TuningScreen.jsx"></script>
<script type="text/babel" src="CreateScreen.jsx"></script>
<script type="text/babel" src="RehearsalScreen.jsx"></script>
<script type="text/babel" src="EnsembleScreen.jsx"></script>
<script type="text/babel">
function App() {
  const I = window.TuttiIcons;
  const [route, setRoute] = React.useState('studio');
  const Screen = {
    studio: window.TuttiStudioScreen,
    create: window.TuttiCreateScreen,
    rehearsal: window.TuttiRehearsalScreen,
    ensemble: window.TuttiEnsembleScreen,
    tuning: window.TuttiTuningScreen,
  }[route];
  return (
    <React.Fragment>
      <window.TuttiSidebar route={route} setRoute={setRoute} />
      <div className="main">
        <div className="topstrip">
          <span style={{ display:'inline-flex', color:'var(--slate-500)' }}>{I.search({ size: 19 })}</span>
          <span style={{ display:'inline-flex', color:'var(--slate-500)' }}>{I.bell({ size: 19 })}</span>
          <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>Acme · Pro</span>
        </div>
        <div className="main-inner">
          <Screen setRoute={setRoute} />
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body></html>
