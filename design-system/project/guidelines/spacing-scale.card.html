<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-card); display:flex; gap:14px; align-items:flex-end; }
  .s { text-align:center; }
  .bar { background:var(--teal-100); border:1px solid var(--teal-500); border-radius:4px; }
  .t { font-size:11px; color:var(--text-muted); font-family:var(--font-mono); margin-top:6px; }
</style></head>
<body>
  <div class="s"><div class="bar" style="width:4px;height:4px"></div><div class="t">1·4</div></div>
  <div class="s"><div class="bar" style="width:8px;height:8px"></div><div class="t">2·8</div></div>
  <div class="s"><div class="bar" style="width:12px;height:12px"></div><div class="t">3·12</div></div>
  <div class="s"><div class="bar" style="width:16px;height:16px"></div><div class="t">4·16</div></div>
  <div class="s"><div class="bar" style="width:24px;height:24px"></div><div class="t">6·24</div></div>
  <div class="s"><div class="bar" style="width:32px;height:32px"></div><div class="t">8·32</div></div>
  <div class="s"><div class="bar" style="width:48px;height:48px"></div><div class="t">12·48</div></div>
  <div class="s"><div class="bar" style="width:64px;height:64px"></div><div class="t">16·64</div></div>
  <div class="s"><div class="bar" style="width:80px;height:80px"></div><div class="t">20·80</div></div>
</body></html>
