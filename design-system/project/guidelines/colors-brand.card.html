<!-- @dsCard group="Colors" viewport="700x190" name="Brand palette" subtitle="The six core brand colors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:62px; border-radius:var(--radius-md); box-shadow:var(--shadow-xs); border:1px solid rgba(11,24,51,.06); }
  .nm { font-size:13px; font-weight:700; color:var(--text-strong); margin-top:10px; }
  .hex { font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }
  .role { font-size:11px; color:var(--text-muted); margin-top:1px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy)"></div><div class="nm">Navy</div><div class="hex">#0B1833</div><div class="role">Ink / primary</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="nm">Blue</div><div class="hex">#2563EB</div><div class="role">Primary action</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal)"></div><div class="nm">Teal</div><div class="hex">#1488A6</div><div class="role">Music / accent</div></div>
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="nm">Green</div><div class="hex">#22C55E</div><div class="role">In tune / growth</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate)"></div><div class="nm">Slate</div><div class="hex">#64748B</div><div class="role">Secondary text</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray);border:1px solid var(--border-strong)"></div><div class="nm">Gray</div><div class="hex">#E5E7EB</div><div class="role">Lines / surfaces</div></div>
  </div>
</body></html>
