<!-- @dsCard group="Brand" viewport="700x150" name="Voice & tone" subtitle="Talk like a great bandleader" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--surface-card); display:flex; gap:18px; }
  .col { flex:1; }
  .h { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:10px; }
  .do .h { color:var(--green-600); }
  .dont .h { color:var(--slate-500); }
  .line { font-size:14px; padding:5px 0; color:var(--text-body); display:flex; gap:8px; }
  .line::before { font-weight:700; }
  .do .line::before { content:'♪'; color:var(--green-500); }
  .dont .line::before { content:'×'; color:var(--gray-400); }
  .dont .line { color:var(--text-muted); }
  .sep { width:1px; background:var(--gray-100); }
</style></head>
<body>
  <div class="col do">
    <div class="h">Sounds like Tutti</div>
    <div class="line">This might squeak a bit.</div>
    <div class="line">In tune — 96% sounds like you.</div>
    <div class="line">Harmony, not unison.</div>
    <div class="line">From first note to full stadium.</div>
  </div>
  <div class="sep"></div>
  <div class="col dont">
    <div class="h">Sounds flat</div>
    <div class="line">Unlock game-changing synergy</div>
    <div class="line">Revolutionary AI-powered platform</div>
    <div class="line">In today's fast-paced world…</div>
    <div class="line">Delve into a paradigm shift</div>
  </div>
</body></html>
