<!-- @dsCard group="Type" viewport="700x150" name="Weights & specimen" subtitle="Inter Regular → Extrabold" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-card); display:flex; gap:30px; align-items:center; }
  .big { font-size:84px; font-weight:800; color:var(--navy); letter-spacing:-.03em; line-height:1; }
  .ws { display:grid; grid-template-columns:auto auto; gap:4px 18px; align-items:baseline; }
  .ws span:nth-child(odd){ font-size:20px; color:var(--text-strong); }
  .ws span:nth-child(even){ font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }
</style></head>
<body>
  <div class="big">Aa</div>
  <div class="ws">
    <span style="font-weight:400">Regular</span><span>400 · body</span>
    <span style="font-weight:500">Medium</span><span>500 · UI labels</span>
    <span style="font-weight:600">Semibold</span><span>600 · emphasis</span>
    <span style="font-weight:700">Bold</span><span>700 · headings</span>
    <span style="font-weight:800">Extrabold</span><span>800 · display</span>
  </div>
</body></html>
