<!-- @dsCard group="Colors" viewport="700x150" name="Dual accent system" subtitle="Teal = musical soul · Green = on-key success" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-card); display:flex; gap:16px; }
  .acc { flex:1; border-radius:var(--radius-lg); padding:18px 20px; color:#fff; }
  .acc h4 { color:#fff; margin:0 0 4px; font-size:18px; }
  .acc p { margin:0; font-size:13px; opacity:.92; line-height:1.45; }
  .teal { background:linear-gradient(135deg,var(--teal-500),var(--teal-600)); }
  .green { background:linear-gradient(135deg,var(--green-500),var(--green-600)); }
  .tag { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:rgba(255,255,255,.22); padding:3px 9px; border-radius:999px; margin-bottom:9px; }
</style></head>
<body>
  <div class="acc teal"><span class="tag">Teal</span><h4>Brand soul</h4><p>Carries the musical, human moments — tuning, the Score, "your part."</p></div>
  <div class="acc green"><span class="tag">Green</span><h4>On key</h4><p>Signals success, growth, and "in tune" — the 96% sounds-like-you score.</p></div>
</body></html>
