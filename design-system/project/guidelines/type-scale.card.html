<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Inter — display to caption" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-card); }
  .r { display:flex; align-items:baseline; gap:16px; padding:4px 0; border-bottom:1px solid var(--gray-100); }
  .r:last-child { border-bottom:0; }
  .meta { width:96px; flex:none; font-size:11px; color:var(--text-muted); font-family:var(--font-mono); }
  .spec { color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head>
<body>
  <div class="r"><span class="meta">56 / 800</span><span class="spec" style="font-size:40px;font-weight:800;letter-spacing:-.02em">From first note</span></div>
  <div class="r"><span class="meta">40 / 700</span><span class="spec" style="font-size:32px;font-weight:700;letter-spacing:-.01em">One score, every voice</span></div>
  <div class="r"><span class="meta">24 / 700</span><span class="spec" style="font-size:22px;font-weight:700">Your team, in tune</span></div>
  <div class="r"><span class="meta">16 / 400</span><span class="spec" style="font-size:16px;color:var(--text-body)">Body — clear and readable, the way you'd explain it to a friend.</span></div>
  <div class="r"><span class="meta">13 / 600</span><span class="spec" style="font-size:13px;font-weight:600;color:var(--text-muted)">Caption · metadata</span></div>
  <div class="r"><span class="meta">11 / 700</span><span class="spec tt-eyebrow" style="font-size:11px">Onboarding · Tuning</span></div>
</body></html>
