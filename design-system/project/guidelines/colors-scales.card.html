<!-- @dsCard group="Colors" viewport="700x150" name="Tint & shade scales" subtitle="Blue, teal, green and neutral ramps" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-card); }
  .scale { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .lbl { width:62px; font-size:12px; font-weight:700; color:var(--text-strong); }
  .ramp { display:flex; flex:1; gap:6px; }
  .c { flex:1; height:26px; border-radius:6px; border:1px solid rgba(11,24,51,.05); }
</style></head>
<body>
  <div class="scale"><span class="lbl">Blue</span><div class="ramp">
    <div class="c" style="background:var(--blue-50)"></div><div class="c" style="background:var(--blue-100)"></div><div class="c" style="background:var(--blue-200)"></div><div class="c" style="background:var(--blue-500)"></div><div class="c" style="background:var(--blue-600)"></div><div class="c" style="background:var(--blue-700)"></div></div></div>
  <div class="scale"><span class="lbl">Teal</span><div class="ramp">
    <div class="c" style="background:var(--teal-50)"></div><div class="c" style="background:var(--teal-100)"></div><div class="c" style="background:var(--teal-500)"></div><div class="c" style="background:var(--teal-600)"></div><div class="c" style="background:var(--teal-700)"></div><div class="c" style="background:var(--navy-900)"></div></div></div>
  <div class="scale"><span class="lbl">Green</span><div class="ramp">
    <div class="c" style="background:var(--green-50)"></div><div class="c" style="background:var(--green-100)"></div><div class="c" style="background:var(--green-500)"></div><div class="c" style="background:var(--green-600)"></div><div class="c" style="background:var(--green-700)"></div><div class="c" style="background:var(--navy-800)"></div></div></div>
  <div class="scale"><span class="lbl">Neutral</span><div class="ramp">
    <div class="c" style="background:var(--gray-50)"></div><div class="c" style="background:var(--gray-100)"></div><div class="c" style="background:var(--gray-200)"></div><div class="c" style="background:var(--gray-300)"></div><div class="c" style="background:var(--slate-500)"></div><div class="c" style="background:var(--navy-900)"></div></div></div>
</body></html>
