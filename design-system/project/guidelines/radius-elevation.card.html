<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & elevation" subtitle="Soft rounding, navy-tinted shadows" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface-card); display:flex; gap:30px; align-items:center; }
  .grp { display:flex; gap:16px; align-items:flex-end; }
  .box { width:70px; height:54px; background:#fff; border:1px solid var(--border-subtle); display:flex; align-items:flex-end; justify-content:center; }
  .box span { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); padding-bottom:5px; }
  .sh { width:78px; height:54px; background:#fff; border-radius:var(--radius-md); display:flex; align-items:flex-end; justify-content:center; }
  .sh span { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); padding-bottom:5px; }
  .divider { width:1px; align-self:stretch; background:var(--gray-100); }
</style></head>
<body>
  <div class="grp">
    <div class="box" style="border-radius:var(--radius-sm)"><span>8</span></div>
    <div class="box" style="border-radius:var(--radius-md)"><span>12</span></div>
    <div class="box" style="border-radius:var(--radius-lg)"><span>16</span></div>
    <div class="box" style="border-radius:var(--radius-xl)"><span>24</span></div>
    <div class="box" style="border-radius:var(--radius-pill)"><span>pill</span></div>
  </div>
  <div class="divider"></div>
  <div class="grp">
    <div class="sh" style="box-shadow:var(--shadow-xs)"><span>xs</span></div>
    <div class="sh" style="box-shadow:var(--shadow-sm)"><span>sm</span></div>
    <div class="sh" style="box-shadow:var(--shadow-md)"><span>md</span></div>
    <div class="sh" style="box-shadow:var(--shadow-lg)"><span>lg</span></div>
  </div>
</body></html>
